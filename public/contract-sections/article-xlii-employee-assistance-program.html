<h2>Article XLII — Employee Assistance Program</h2>
<div class="contract-accordion-body"><h2 id="article-xlii">ARTICLE XLII</h2><h3 id="employee-assistance-program">Employee Assistance Program</h3><p>The University shall continue to provide an Employee Assistance Program. This plan will not be operated at the Yale Health Plan. It will be available to all Staff Members without charge.</p></div>
