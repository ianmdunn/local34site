<h2>Article XXXI — Uniforms</h2>
<div class="contract-accordion-body"><h2 id="article-xxxi">ARTICLE XXXI</h2><h3 id="uniforms">Uniforms</h3><p>The University will continue for the term of this Agreement its present practices with regard to providing and cleaning uniforms or other clothing for Staff Members required by the University to wear such uniform or other clothing.</p></div>
