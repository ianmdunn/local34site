worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # 1. Redirect www to non-www; redirect HTTP to HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name www.local34.org local34.org;
        return 301 https://local34.org$request_uri;
    }

    # 2. Canonical site: local34.org (add ssl_certificate / ssl_certificate_key if nginx terminates SSL)
    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;
        server_name local34.org;
        # ssl_certificate     /path/to/fullchain.pem;
        # ssl_certificate_key /path/to/privkey.pem;

        root /usr/share/nginx/html;
        index index.html index.htm;
        include /etc/nginx/mime.types;

        gzip on;
        gzip_min_length 1000;
        gzip_proxied expired no-cache no-store private auth;
        gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        error_page 404 /404.html;
        location = /404.html {
            root /usr/share/nginx/html;
            internal;
        }

        location / {
            try_files $uri $uri/index.html =404;
        }
    }
}