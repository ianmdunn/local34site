[build]
  publish = "dist"
  command = "npm run build"
[build.processing.html]
  pretty_urls = false

# Redirect www to non-www so pages always open on canonical host
[[redirects]]
  from = "http://www.local34.org/*"
  to = "https://local34.org/:splat"
  status = 301
  force = true
[[redirects]]
  from = "https://www.local34.org/*"
  to = "https://local34.org/:splat"
  status = 301
  force = true
[[redirects]]
  from = "http://local34.org/*"
  to = "https://local34.org/:splat"
  status = 301
  force = true

# Security headers (production)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
